spring.application.name=ABDM-HMS
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/abdm_hms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=never

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
ehrbase.base-url=http://localhost:8080/ehrbase/rest/openehr/v1